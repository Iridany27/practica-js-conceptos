<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Passwords</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Generador de Contraseñas</h1>
        
        <div class="result-container">
            <span id="passwordResult">P4$$w0rd!</span>
        </div>

        <div class="settings">
            <div class="setting">
                <label>Longitud (mínimo 8)</label>
                <input type="number" id="lengthInput" min="8" max="20" value="12">
            </div>
            <div class="setting">
                <label>Incluir Números</label>
                <input type="checkbox" id="includeNumbers" checked>
            </div>
            <div class="setting">
                <label>Incluir Símbolos</label>
                <input type="checkbox" id="includeSymbols" checked>
            </div>
        </div>

        <button id="generateBtn">Generar Contraseña</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
